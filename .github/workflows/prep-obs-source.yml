name: Prepare OBS source

# Triggered manually or by sync-upstream.yml after it pushes a new upstream tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v19.0.4)'
        required: true

concurrency:
  group: prep-obs-source-${{ github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── 1. Build web assets ────────────────────────────────────────────────────
  build-webassets:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      autobuild_sha: ${{ steps.autobuild.outputs.sha }}

    steps:
      - name: Resolve tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Invalid tag: $TAG" >&2
              exit 1
              ;;
          esac
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout source at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.version.outputs.tag }}
          persist-credentials: false

      - name: Resolve autobuild revision
        id: autobuild
        run: |
          AUTOBUILD_SHA=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/autobuild | awk '{print $1}')
          if ! printf '%s' "$AUTOBUILD_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Could not resolve autobuild revision" >&2
            exit 1
          fi
          echo "sha=$AUTOBUILD_SHA" >> "$GITHUB_OUTPUT"

      - name: Apply patches (if any)
        env:
          AUTOBUILD_SHA: ${{ steps.autobuild.outputs.sha }}
        run: |
          git fetch --depth=1 origin "$AUTOBUILD_SHA"
          TMP=$(mktemp -d)
          git archive "$AUTOBUILD_SHA" patches/ | tar -x -C "$TMP" 2>/dev/null || true
          PATCHES=$(find "$TMP/patches" -name '*.patch' | sort 2>/dev/null)
          if [ -n "$PATCHES" ]; then
            echo "Applying patches:"
            for p in $PATCHES; do
              echo "  $p"
              git apply "$p"
            done
          else
            echo "No patches to apply."
          fi

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vendor Go modules
        run: |
          go mod vendor
          mkdir -p webassets/teleport webassets/e/teleport
          touch webassets/teleport/placeholder.txt
          touch webassets/e/teleport/placeholder.txt
          go -C build.assets/tooling mod vendor
          rm -f webassets/teleport/placeholder.txt
          rm -f webassets/e/teleport/placeholder.txt
          tar czf vendor.tar.gz vendor/ build.assets/tooling/vendor/

      - name: Upload Go vendor artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-vendor
          path: vendor.tar.gz
          retention-days: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack install

      - name: Build web assets
        run: |
          make ensure-webassets
          test -s webassets/oss-sha
        # Populates webassets/teleport/ and writes webassets/oss-sha.
        # The oss-sha file lets build-webassets-if-changed.sh detect these as
        # up-to-date in OBS without needing to re-run pnpm.

      - name: Package webassets
        run: tar czf teleport-webassets.tar.gz webassets/

      - name: Upload webassets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webassets
          path: teleport-webassets.tar.gz
          retention-days: 1

  # ── 2. Build fdpass-teleport for Ubuntu (Rust 1.75 in Ubuntu 24.04 is too old) ──
  build-fdpass:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    needs: [build-webassets]

    steps:
      - name: Checkout source at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build-webassets.outputs.tag }}
          persist-credentials: false

      - name: Apply patches (if any)
        env:
          AUTOBUILD_SHA: ${{ needs.build-webassets.outputs.autobuild_sha }}
        run: |
          git fetch --depth=1 origin "$AUTOBUILD_SHA"
          TMP=$(mktemp -d)
          git archive "$AUTOBUILD_SHA" patches/ | tar -x -C "$TMP" 2>/dev/null || true
          PATCHES=$(find "$TMP/patches" -name '*.patch' | sort 2>/dev/null)
          if [ -n "$PATCHES" ]; then
            echo "Applying patches:"
            for p in $PATCHES; do
              echo "  $p"
              git apply "$p"
            done
          else
            echo "No patches to apply."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: '1.94.0'
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Install cross-compilation tools (arm64 only)
        if: matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build fdpass-teleport
        working-directory: tool/fdpass-teleport
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            cargo build --release --locked --target aarch64-unknown-linux-gnu
            cp target/aarch64-unknown-linux-gnu/release/fdpass-teleport fdpass-teleport-linux-arm64
          else
            cargo build --release --locked --target x86_64-unknown-linux-gnu
            cp target/x86_64-unknown-linux-gnu/release/fdpass-teleport fdpass-teleport-linux-amd64
          fi

      - name: Upload fdpass artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fdpass-${{ matrix.arch }}
          path: tool/fdpass-teleport/fdpass-teleport-linux-${{ matrix.arch }}
          retention-days: 1

  # ── 3. Vendor fdpass Rust deps for Tumbleweed OBS build ───────────────────
  vendor-fdpass:
    runs-on: ubuntu-latest
    needs: [build-webassets]

    steps:
      - name: Checkout source at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build-webassets.outputs.tag }}
          persist-credentials: false

      - name: Apply patches (if any)
        env:
          AUTOBUILD_SHA: ${{ needs.build-webassets.outputs.autobuild_sha }}
        run: |
          git fetch --depth=1 origin "$AUTOBUILD_SHA"
          TMP=$(mktemp -d)
          git archive "$AUTOBUILD_SHA" patches/ | tar -x -C "$TMP" 2>/dev/null || true
          PATCHES=$(find "$TMP/patches" -name '*.patch' | sort 2>/dev/null)
          if [ -n "$PATCHES" ]; then
            echo "Applying patches:"
            for p in $PATCHES; do
              echo "  $p"
              git apply "$p"
            done
          else
            echo "No patches to apply."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: '1.94.0'

      - name: Vendor fdpass-teleport Rust dependencies
        working-directory: tool/fdpass-teleport
        run: |
          mkdir -p .cargo
          cargo vendor vendor 2>/dev/null | tee .cargo/config.toml.snippet
          cat >> .cargo/config.toml << 'EOF'
          # auto-generated by vendor step — do not edit
          EOF
          cat .cargo/config.toml.snippet >> .cargo/config.toml

      - name: Package vendor archive
        run: |
          tar czf teleport-fdpass-vendor.tar.gz \
            tool/fdpass-teleport/vendor/ \
            tool/fdpass-teleport/.cargo/

      - name: Upload vendor artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fdpass-vendor
          path: teleport-fdpass-vendor.tar.gz
          retention-days: 1

  # ── 4. Publish assets and trigger OBS ─────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [build-webassets, build-fdpass, vendor-fdpass]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      # obs-build-source mirrors an upstream tag, including upstream workflow
      # files. Use the same GitHub App token as sync-upstream so the push is
      # allowed to update workflow files.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout source at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build-webassets.outputs.tag }}
          path: teleport-src
          persist-credentials: false

      - name: Update OBS source branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.build-webassets.outputs.tag }}
          VERSION: ${{ needs.build-webassets.outputs.version }}
          AUTOBUILD_SHA: ${{ needs.build-webassets.outputs.autobuild_sha }}
        run: |
          cd teleport-src
          git fetch --depth=1 origin "$AUTOBUILD_SHA"
          TMP=$(mktemp -d)
          git archive "$AUTOBUILD_SHA" obs/teleport | tar -x -C "$TMP"
          mkdir -p debian
          cp "$TMP/obs/teleport/debian.control" debian/control
          cp "$TMP/obs/teleport/debian.rules" debian/rules
          cp "$TMP/obs/teleport/debian.copyright" debian/copyright
          cp "$TMP/obs/teleport/debian.changelog" debian/changelog
          chmod 755 debian/rules
          sed -i -E "1s/^teleport \\([^)]+\\)/teleport (${VERSION}-0)/" debian/changelog
          sed -i -E "s/upstream v[0-9A-Za-z.+-]+/upstream ${TAG}/" debian/changelog
          git config user.name "teleport-fork automation"
          git config user.email "noreply@github.com"
          git add debian
          git commit -m "Add OBS Debian packaging for ${TAG}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:refs/heads/obs-build-source" \
            --force
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$AUTOBUILD_SHA:refs/heads/obs-build-inputs" \
            --force
          echo "OBS source branch now points at $TAG"
          echo "OBS input branch now points at $AUTOBUILD_SHA"

      - name: Stage assets with fixed names
        # OBS _service uses stable URLs that never change between versions.
        # We update a persistent "build-assets" release in-place each run.
        env:
          TAG: ${{ needs.build-webassets.outputs.tag }}
          VERSION: ${{ needs.build-webassets.outputs.version }}
          AUTOBUILD_SHA: ${{ needs.build-webassets.outputs.autobuild_sha }}
        run: |
          cp artifacts/webassets/teleport-webassets.tar.gz         teleport-webassets.tar.gz
          cp artifacts/fdpass-vendor/teleport-fdpass-vendor.tar.gz teleport-fdpass-vendor.tar.gz
          cp artifacts/go-vendor/vendor.tar.gz                     vendor.tar.gz
          cp artifacts/fdpass-amd64/fdpass-teleport-linux-amd64    fdpass-teleport-linux-amd64
          cp artifacts/fdpass-arm64/fdpass-teleport-linux-arm64    fdpass-teleport-linux-arm64

          GOLANG_VERSION=$(awk '$1 == "GOLANG_VERSION" && $2 == "?=" { print $3; exit }' teleport-src/build.assets/versions.mk)
          if [ -z "$GOLANG_VERSION" ]; then
            echo "Could not find GOLANG_VERSION in build.assets/versions.mk" >&2
            exit 1
          fi

          echo "Using Go toolchain: $GOLANG_VERSION"
          printf '%s\n' "$GOLANG_VERSION" > teleport-go-version.txt
          curl -fsSL -o teleport-go-linux-amd64.tar.gz "https://go.dev/dl/${GOLANG_VERSION}.linux-amd64.tar.gz"
          curl -fsSL -o teleport-go-linux-arm64.tar.gz "https://go.dev/dl/${GOLANG_VERSION}.linux-arm64.tar.gz"
          curl -fsSL -o go-downloads.json "https://go.dev/dl/?mode=json&include=all"
          python3 - "$GOLANG_VERSION" <<'PY' > go-toolchain.sha256
          import json
          import sys

          version = sys.argv[1]
          wanted = {
              f"{version}.linux-amd64.tar.gz": "teleport-go-linux-amd64.tar.gz",
              f"{version}.linux-arm64.tar.gz": "teleport-go-linux-arm64.tar.gz",
          }

          with open("go-downloads.json", encoding="utf-8") as f:
              releases = json.load(f)

          found = {}
          for release in releases:
              for file in release.get("files", []):
                  filename = file.get("filename")
                  if filename in wanted:
                      found[filename] = file.get("sha256")

          missing = sorted(set(wanted) - set(found))
          if missing:
              raise SystemExit(f"missing Go checksums: {', '.join(missing)}")

          for filename, output_name in wanted.items():
              print(f"{found[filename]}  {output_name}")
          PY
          sha256sum -c go-toolchain.sha256

          cat > teleport-build-assets.env <<EOF
          TELEPORT_TAG=$TAG
          TELEPORT_VERSION=$VERSION
          AUTOBUILD_SHA=$AUTOBUILD_SHA
          GOLANG_VERSION=$GOLANG_VERSION
          EOF

          sha256sum \
            teleport-build-assets.env \
            teleport-webassets.tar.gz \
            teleport-fdpass-vendor.tar.gz \
            vendor.tar.gz \
            fdpass-teleport-linux-amd64 \
            fdpass-teleport-linux-arm64 \
            teleport-go-linux-amd64.tar.gz \
            teleport-go-linux-arm64.tar.gz \
            teleport-go-version.txt \
            > teleport-build-assets.sha256

      - name: Update OBS assets branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.build-webassets.outputs.tag }}
        run: |
          mkdir obs-assets
          cp \
            teleport-webassets.tar.gz \
            teleport-fdpass-vendor.tar.gz \
            vendor.tar.gz \
            fdpass-teleport-linux-amd64 \
            fdpass-teleport-linux-arm64 \
            teleport-go-linux-amd64.tar.gz \
            teleport-go-linux-arm64.tar.gz \
            teleport-go-version.txt \
            teleport-build-assets.env \
            teleport-build-assets.sha256 \
            obs-assets/

          cd obs-assets
          git init
          git config user.name "teleport-fork automation"
          git config user.email "noreply@github.com"
          git checkout -b obs-build-assets
          git add .
          git commit -m "Build assets for ${TAG}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:refs/heads/obs-build-assets" \
            --force

      - name: Trigger OBS rebuild
        env:
          OBS_TRIGGER_TOKEN: ${{ secrets.OBS_TRIGGER_TOKEN }}
          TAG: ${{ needs.build-webassets.outputs.tag }}
        run: |
          # Assets are uploaded above, so timing is safe.
          # OBS _service uses obs-build-source, updated above to this tag,
          # plus obs-build-assets, updated above with matching assets.
          OBS_PROJECT="home:dannysauer"
          for package in gravitational_teleport; do
            echo "Triggering OBS rebuild: $OBS_PROJECT / $package ($TAG)"
            curl -sf -X POST \
              "https://build.opensuse.org/trigger/runservice?project=${OBS_PROJECT}&package=${package}&token=${OBS_TRIGGER_TOKEN}" \
              && echo "  OK" \
              || echo "  Warning: trigger failed (OBS may retry on schedule)"
          done
