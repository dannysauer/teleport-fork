name: Test patches

on:
  push:
    branches: [autobuild]
    paths: ['patches/**']
  pull_request:
    paths: ['patches/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout autobuild branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: autobuild

      - name: Checkout upstream master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          path: upstream

      - name: Apply patches
        working-directory: upstream
        run: |
          for patch in ../autobuild/patches/*.patch; do
            [ -f "$patch" ] || continue
            name="$(basename "$patch")"
            echo "Applying $name …"
            git apply "$patch"
            echo "  ✓ $name"
          done

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: upstream/go.mod
          cache-dependency-path: upstream/go.sum

      - name: Check gofmt
        working-directory: upstream
        run: |
          bad=""
          for patch in ../autobuild/patches/*.patch; do
            [ -f "$patch" ] || continue
            go_files=$(grep -E '^\+\+\+ b/' "$patch" | sed 's|^+++ b/||' | grep '\.go$' || true)
            for f in $go_files; do
              [ -f "$f" ] || continue
              if ! diff -q <(gofmt "$f") "$f" &>/dev/null; then
                echo "::error file=$f::Not gofmt-formatted"
                bad=1
              fi
            done
          done
          [ -z "$bad" ]

      - name: Run go vet
        working-directory: upstream
        run: go vet ./lib/auth/...

      - name: Run unit tests
        working-directory: upstream
        run: |
          go test -v -count=1 -run 'TestClaimValue|TestExtractUsername|TestClaimsFromIDToken' ./lib/auth/
